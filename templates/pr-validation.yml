name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.al'
      - 'app.json'
      - '.github/workflows/pr-validation.yml'

# Cancel in-progress runs on new push to the same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Compile & Analyse AL
    # ─────────────────────────────────────────
    # To migrate to self-hosted: replace with
    # runs-on: self-hosted
    # ─────────────────────────────────────────
    runs-on: windows-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────
      # 2. Read app.json metadata
      # ─────────────────────────────────────────
      - name: Read app.json
        id: app
        shell: pwsh
        run: |
          $appJson = Get-Content "app.json" | ConvertFrom-Json
          echo "name=$($appJson.name)" >> $env:GITHUB_OUTPUT
          echo "version=$($appJson.version)" >> $env:GITHUB_OUTPUT
          echo "publisher=$($appJson.publisher)" >> $env:GITHUB_OUTPUT
          echo "bcVersion=$($appJson.application)" >> $env:GITHUB_OUTPUT
          Write-Host "App: $($appJson.name) v$($appJson.version)"
          Write-Host "Publisher: $($appJson.publisher)"
          Write-Host "BC target: $($appJson.application)+"

      # ─────────────────────────────────────────
      # 3. Install BcContainerHelper
      # ─────────────────────────────────────────
      - name: Install BcContainerHelper
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module BcContainerHelper -AllowClobber -Force
          Write-Host "BcContainerHelper $(Get-Module BcContainerHelper -ListAvailable | Select-Object -First 1 -ExpandProperty Version) installed"

      # ─────────────────────────────────────────
      # 4. Download BC artifacts (compiler only)
      # ─────────────────────────────────────────
      - name: Download BC compiler artifacts
        id: artifacts
        shell: pwsh
        run: |
          $artifactUrl = Get-BCArtifactUrl `
            -type Sandbox `
            -country base `
            -version "${{ steps.app.outputs.bcVersion }}" `
            -select Latest

          Write-Host "Artifact URL: $artifactUrl"
          echo "url=$artifactUrl" >> $env:GITHUB_OUTPUT

          $artifactPath = Download-Artifacts -artifactUrl $artifactUrl -includePlatform
          echo "path=$artifactPath" >> $env:GITHUB_OUTPUT
          Write-Host "Artifacts downloaded to: $artifactPath"

      # ─────────────────────────────────────────
      # 5. Compile AL app
      # ─────────────────────────────────────────
      - name: Compile AL app
        shell: pwsh
        run: |
          $artifactPath = "${{ steps.artifacts.outputs.path }}"
          $compilerPath = (Get-Item "$artifactPath\*\compiler\linux\alc").FullName

          if (-not $compilerPath) {
            # Fallback to Windows compiler
            $compilerPath = (Get-Item "$artifactPath\*\compiler\win32\alc.exe").FullName
          }

          Write-Host "Using compiler: $compilerPath"

          $outputPath = Join-Path $env:RUNNER_TEMP "output"
          New-Item -ItemType Directory -Force -Path $outputPath | Out-Null

          $result = & $compilerPath `
            /project:"$env:GITHUB_WORKSPACE" `
            /packagecachepath:"$env:GITHUB_WORKSPACE\.alpackages" `
            /out:"$outputPath\${{ steps.app.outputs.publisher }}_${{ steps.app.outputs.name }}_${{ steps.app.outputs.version }}.app" `
            /analyzer:CodeCop `
            /analyzer:UICop `
            /analyzer:PerTenantExtensionCop

          $exitCode = $LASTEXITCODE

          if ($exitCode -ne 0) {
            Write-Host "::error::AL compilation failed with exit code $exitCode"
            exit $exitCode
          }

          Write-Host "✓ Compilation successful"

      # ─────────────────────────────────────────
      # 6. Report results
      # ─────────────────────────────────────────
      - name: Report PR status
        if: always()
        shell: pwsh
        run: |
          if ($env:JOB_STATUS -eq "success") {
            Write-Host "✓ PR validation passed"
            Write-Host "  App: ${{ steps.app.outputs.name }} v${{ steps.app.outputs.version }}"
            Write-Host "  BC target: ${{ steps.app.outputs.bcVersion }}+"
          } else {
            Write-Host "✗ PR validation failed — see errors above"
          }
        env:
          JOB_STATUS: ${{ job.status }}
